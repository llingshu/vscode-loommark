name: Feature request
description: Suggest a focused improvement to LoomMark.
title: "[Feature]: "
labels: [enhancement, triage]
body:
  - type: textarea
    attributes:
      label: Problem
      description: What workflow or limitation should be improved?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed behavior
      description: Describe the desired user experience, not only an implementation.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives considered
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional context
      description: Add examples, mockups, or related projects when useful.
