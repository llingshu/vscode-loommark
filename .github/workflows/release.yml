name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: node scripts/verify-release.mjs "$GITHUB_REF_NAME"

      - name: Validate and package
        run: npm run package

      - name: Publish to Visual Studio Marketplace
        run: npx --no-install vsce publish --packagePath artifacts/loommark.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: npx --no-install ovsx publish artifacts/loommark.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" artifacts/loommark.vsix --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
